<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>약사고등학교 입시 도우미</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="univ.css">
</head>
<body>
    <header class="top-nav">
        <h1>서울권 주요 대학 입시 결과 및 예측</h1>
        <a href="index.html" class="nav-btn">타이머/추첨기로 돌아가기</a>
    </header>

    <div class="container univ-container">
        <aside class="left-panel tree-panel">
            <h2>대학 목록</h2>
            <p class="tree-desc">대학 이름을 클릭하면 학과가 보입니다.</p>
            <ul id="univ-tree" class="univ-tree">
                <!-- 자바스크립트로 렌더링 -->
            </ul>
        </aside>

        <main class="right-panel data-panel">
            <div id="data-display" class="data-display">
                <div class="empty-state">왼쪽에서 확인하고 싶은 학과를 선택해주세요.</div>
            </div>
        </main>
    </div>

    <!-- 하단 고정 예측 탭 -->
    <div class="bottom-tab">
        <div class="tab-content">
            <div class="input-group">
                <label for="user-score">내 평균 백분위 점수 입력:</label>
                <input type="number" id="user-score" placeholder="예: 95.5" step="0.1" min="0" max="100">
                <button id="predict-btn" class="action-btn start">합격 예측(칸수) 확인</button>
            </div>
            
            <div class="prediction-result">
                <div class="battery-container" id="battery-container">
                    <!-- 8칸이 JS로 렌더링됨 -->
                    <div class="battery-cell"></div>
                    <div class="battery-cell"></div>
                    <div class="battery-cell"></div>
                    <div class="battery-cell"></div>
                    <div class="battery-cell"></div>
                    <div class="battery-cell"></div>
                    <div class="battery-cell"></div>
                    <div class="battery-cell"></div>
                </div>
                <div id="prediction-text" class="prediction-text">점수를 입력하고 예측 버튼을 눌러주세요!</div>
            </div>
        </div>
    </div>
    
    <script src="univ.js"></script>
</body>
</html>
